name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - goos: darwin
            goarch: amd64
            runner: macos-13
            cc: clang
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: clang

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install cross-compiler
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags="-s -w" -o pdf-to-webpage .

      - name: Compress with UPX (Linux only)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          upx --best pdf-to-webpage

      - name: Package artifact
        run: |
          ARCHIVE="pdf-to-webpage_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "$ARCHIVE"
          cp pdf-to-webpage "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE "$ARCHIVE/" 2>/dev/null || true
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: pdf-to-webpage_${{ matrix.goos }}_${{ matrix.goarch }}
          path: pdf-to-webpage_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

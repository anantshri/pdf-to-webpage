name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - goos: darwin
            goarch: amd64
            runner: macos-13
            cc: clang
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: clang

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install cross-compiler
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            LDFLAGS='-s -w -extldflags=-Wl,-no_warn_duplicate_libraries'
          else
            LDFLAGS='-s -w'
          fi
          go build -trimpath -ldflags="$LDFLAGS" -o pdf-to-webpage .

      - name: Compress with UPX (Linux only)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          upx --best pdf-to-webpage

      - name: Package artifact
        run: |
          ARCHIVE="pdf-to-webpage_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "$ARCHIVE"
          cp pdf-to-webpage "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE "$ARCHIVE/" 2>/dev/null || true
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdf-to-webpage_${{ matrix.goos }}_${{ matrix.goarch }}
          path: pdf-to-webpage_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
